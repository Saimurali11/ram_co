name: Auto Merge Main to Branches

on:
  push:
    branches:
      - main

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge main into branch1
        run: |
          git fetch origin branch1
          git checkout branch1
          git reset --hard origin/branch1
          git merge origin/main --no-ff -m "Auto-merge main into branch1" || echo "Nothing to merge"
          git push origin branch1

      - name: Merge main into branch2
        run: |
          git fetch origin branch2
          git checkout branch2
          git reset --hard origin/branch2
          git merge origin/main --no-ff -m "Auto-merge main into branch2" || echo "Nothing to merge"
          git push origin branch2